<form class="full-width" (ngSubmit)="search()">
  <mat-form-field class="full-width" appearance="fill">
    <mat-label>Card Name</mat-label>
    <input matInput type="text" [(ngModel)]="cardName" name="cardName">
    <button *ngIf="cardName" matSuffix mat-icon-button aria-label="Clear" (click)="cardName=''" type="button">
      <mat-icon>close</mat-icon>
    </button>
  </mat-form-field>

  <div id="filterContainer">
    <app-cui-filter *ngFor="let searchFilter of FILTERS" [searchFilter]="searchFilter"></app-cui-filter>
  </div>
  <div class="btn-container">

    <button mat-raised-button color="primary" id="submitSearchBtn" type="submit">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <div *ngIf="error" class="inline-block error">{{error}}</div>

  </div>

  <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>

</form>

<div [hidden]="cards.length == 0" class="table-container">

  <table mat-table [dataSource]="dataSource" class="full-width mat-elevation-z8" matSort matSortActive="Name"
    matSortDisableClear matSortDirection="asc" #cardSort="matSort">

    <ng-container *ngFor="let column of displayedColumns" matColumnDef="{{column}}">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{column}}</th>
      <td mat-cell *matCellDef="let row; let i=index" (click)="openDialog(i)">{{getDisplayValue(row, column)}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
